<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biology27 Conference</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Caveat', cursive;
            background: linear-gradient(135deg, #1a8fa8 0%, #2ba5c4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
        }
        
        .logo {
            width: 200px;
            height: auto;
            margin: 0 auto 30px;
        }
        
        .logo img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        h1 {
            font-size: 3.5em;
            color: #1a8fa8;
            margin-bottom: 40px;
            font-weight: 700;
            letter-spacing: 2px;
        }
        
        .info {
            font-size: 2em;
            color: #333;
            line-height: 1.8;
            margin-bottom: 10px;
        }
        
        .info-label {
            font-weight: 700;
            color: #1a8fa8;
        }
        
        .tagline {
            font-size: 2.2em;
            color: #1a8fa8;
            margin-top: 40px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="Bio27_idea1.1.JPG" alt="Biology27 Conference Logo">
        </div>
        <h1>Biology27</h1>
        <div class="info">
            <div><span class="info-label">What:</span> Biology27 conference</div>
            <div><span class="info-label">Where:</span> Bern</div>
            <div><span class="info-label">When:</span> February 2027</div>
        </div>
        <div class="tagline">Stay tuned!</div>
    </div>
</body>
</html>
